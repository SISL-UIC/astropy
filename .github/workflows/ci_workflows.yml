name: CI
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
env:
  ARCH_ON_CI: normal
  IS_CRON: 'false'
  PYTHONPATH: /tmp/instr
  BASH_ENV: /tmp/instr/bash_env.sh
permissions:
  contents: read
jobs:
  initial_checks:
    name: Mandatory checks before CI
    runs-on: self-hosted
    steps:
    - name: Check base branch
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
      if: github.event_name == 'pull_request' && true
      with:
        script: |
          const skip_label = 'skip-basebranch-check';
          const { default_branch: allowed_basebranch } = context.payload.repository;
          const pr = context.payload.pull_request;
          if (pr.user.login === 'meeseeksmachine') {
            core.info(`Base branch check is skipped since this is auto-backport by ${pr.user.login}`);
            return;
          }
          if (pr.labels.find(lbl => lbl.name === skip_label)) {
            core.info(`Base branch check is skipped due to the presence of ${skip_label} label`);
            return;
          }
          if (pr.base.ref !== allowed_basebranch) {
            core.setFailed(`PR opened against ${pr.base.ref}, not ${allowed_basebranch}`);
          } else {
            core.info(`PR opened correctly against ${allowed_basebranch}`);
          }
    timeout-minutes: 12
  lowest-tree-check:
    name: Check environment lowest resolution against reference
    needs:
    - initial_checks
    permissions:
      contents: none
    runs-on: self-hosted
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      with:
        persist-credentials: false
        fetch-depth: 0
    - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
      name: Install Python
      with:
        python-version: '3.14'
    - run: pipx run scripts/check-lowest-resolved-tree.py
    - if: failure()
      run: pipx run scripts/check-lowest-resolved-tree.py --markdown --quiet >> "$GITHUB_STEP_SUMMARY"
        || true
    timeout-minutes: 12
    if: ${{ !cancelled() }}
  tests:
    needs:
    - initial_checks
    uses: OpenAstronomy/github-actions-workflows/.github/workflows/tox.yml@e5af21e4ae37af089a73bb032e10b78b0e746174
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    with:
      setenv: |
        ARCH_ON_CI: "normal"
        IS_CRON: "false"
        PY_COLORS: "1"
      submodules: false
      coverage: ''
      libraries: |
        apt:
          - language-pack-fr
          - tzdata
      envs: |
        # NOTE: this coverage test is needed for tests and code that
        #       run only with minimal dependencies.
        - name: Python 3.12 with minimal dependencies and full coverage
          linux: py312-test-cov
          coverage: codecov
          cache-path: .tox
          cache-key: mindeps-${{ github.ref_name }}

        - name: Python 3.13 in Parallel with all optional dependencies
          linux: py313-test-alldeps-fitsio
          libraries:
            apt:
              - language-pack-fr
              - tzdata
              - libbz2-dev
              - libcfitsio-dev
          toxargs: -v --develop
          posargs: -n=4 --run-slow
          cache-path: .tox
          cache-key: alldeps-linux-${{ github.ref_name }}

        - name: Python 3.11 with oldest supported version of all dependencies
          linux: py311-test-oldestdeps-alldeps-cov-clocale
          posargs: --remote-data=astropy
          coverage: codecov

        - name: Python 3.13 with all optional dependencies (Windows)
          windows: py313-test-alldeps
          posargs: --durations=50
          cache-path: .tox
          cache-key: alldeps-windows-${{ github.ref_name }}

        - name: Python 3.13 with all optional dependencies (MacOS X)
          macos: py313-test-alldeps
          posargs: --durations=50 --run-slow
          runs-on: macos-latest
          cache-path: .tox
          cache-key: alldeps-macos-${{ github.ref_name }}

        - name: Python 3.13 aarch64, Run tests twice
          linux: py313-test-double
          runs-on: ubuntu-24.04-arm
          posargs: -n=4
          setenv: |
            ARCH_ON_CI: "arm64"
            IS_CRON: "false"
          cache-path: .tox
          cache-key: doubletest-${{ github.ref_name }}
    timeout-minutes: 12
    if: ${{ !cancelled() }}
  allowed_failures:
    needs:
    - initial_checks
    uses: OpenAstronomy/github-actions-workflows/.github/workflows/tox.yml@e5af21e4ae37af089a73bb032e10b78b0e746174
    with:
      setenv: |
        ARCH_ON_CI: "normal"
        IS_CRON: "false"
        PY_COLORS: "1"
      submodules: false
      coverage: ''
      libraries: |
        apt:
          - language-pack-de
          - tzdata
      envs: |
        - name: (Allowed Failure) Python 3.14 with remote data and dev version of key dependencies
          linux: py314-test-devdeps
          posargs: --remote-data=any --verbose
    timeout-minutes: 12
    if: ${{ !cancelled() }}
  stub_tests:
    needs:
    - initial_checks
    uses: OpenAstronomy/github-actions-workflows/.github/workflows/tox.yml@e5af21e4ae37af089a73bb032e10b78b0e746174
    with:
      setenv: |
        ARCH_ON_CI: "normal"
        IS_CRON: "false"
      submodules: false
      envs: |
        - name: Stubs for unit definition modules
          linux: stubtest
          cache-path: .tox
          cache-key: stub_tests-${{ github.ref_name }}
    timeout-minutes: 12
    if: ${{ !cancelled() }}
  test_wheel_building:
    needs:
    - initial_checks
    - lowest-tree-check
    permissions:
      contents: none
    uses: OpenAstronomy/github-actions-workflows/.github/workflows/publish.yml@e5af21e4ae37af089a73bb032e10b78b0e746174
    with:
      upload_to_pypi: false
      upload_to_anaconda: false
      test_extras: test
      test_command: pytest -Wdefault --astropy-header -m "not hypothesis" -k "not
        test_data_out_of_range and not test_set_locale and not TestQuantityTyping"
        --strict-markers --pyargs astropy
      targets: |
        - cp311-manylinux_x86_64
    timeout-minutes: 12
    if: ${{ !cancelled() }}
  test_limited_api_build:
    strategy:
      fail-fast: false
      matrix:
        os:
        - ubuntu-latest
    runs-on: self-hosted
    name: Python 3.11 (build only, partial) with limited API (${{ matrix.os }})
    needs:
    - initial_checks
    - lowest-tree-check
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      with:
        persist-credentials: false
        fetch-depth: 0
    - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
      name: Install Python
      with:
        python-version: '3.11'
    - run: |
        python -m pip install build
        python -m build
      name: Run build
      env:
        EXTENSION_HELPERS_PY_LIMITED_API: cp311
    timeout-minutes: 12
    if: ${{ !cancelled() }}
'on':
  workflow_dispatch: null
  push:
    branches:
    - main
    - v*
    tags:
    - '*'
  pull_request: null
